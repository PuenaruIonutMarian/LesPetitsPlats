<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/14273d579a.js" crossorigin="anonymous"></script>
    <title>Petits Plats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        .ms-n5 {
            margin-left: -40px;
        }
    </style>
</head>

<body class="mx-auto">

    <header class="header">
        <img class="header_logo" src="./assets/utils/logo.svg" alt="Les petits plats">
        <div class="header_cta">
            <h1><span>CHERCHEZ PARMI PLUS DE 1500 RECETTES</span>
                <span>DU QUOTIDIEN,SIMPLES ET DÉLICIEUSES</span>
            </h1>
            <div>
                <input type="text" id="search-recipe" placeholder="Rechercher une recette, un ingrédient, ..."
                    maxlength="50">
                <button aria-label="Clear search"></button>
                <label for="search-recipe" tabindex="0" aria-label="Search recipe"></label>
            </div>
        </div>
    </header>
    <main>
        <!-- FILTERS SECTION -->
        <section class="selection">
            <div class="selectors d-grid gap-2 d-md-block">
                <button id="ingredients" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Ingrédients
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-chevron-compact-down" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M1.553 6.776a.5.5 0 0 1 .67-.223L8 9.44l5.776-2.888a.5.5 0 1 1 .448.894l-6 3a.5.5 0 0 1-.448 0l-6-3a.5.5 0 0 1-.223-.67z" />
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">
                            <input class="form-control  border" type="search" value="search"
                                id="ingredients-search-input">
                        </a></li>
                </ul>
                <button id="appareils" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Appareils
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-chevron-compact-down" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M1.553 6.776a.5.5 0 0 1 .67-.223L8 9.44l5.776-2.888a.5.5 0 1 1 .448.894l-6 3a.5.5 0 0 1-.448 0l-6-3a.5.5 0 0 1-.223-.67z" />
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">
                            <input class="form-control  border" type="search" value="search"
                                id="appareils-search-input">
                        </a></li>
                </ul>
                <button id="ustensiles" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Ustensiles
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-chevron-compact-down" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M1.553 6.776a.5.5 0 0 1 .67-.223L8 9.44l5.776-2.888a.5.5 0 1 1 .448.894l-6 3a.5.5 0 0 1-.448 0l-6-3a.5.5 0 0 1-.223-.67z" />
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">
                            <input class="form-control  border" type="search" value="search"
                                id="ustensiles-search-input">
                        </a></li>
                </ul>
            </div>

            <!-- TAGS PART -->
            <div class="tag_section"></div>

            <!-- CARD COUNtS -->
            <div class="filter_section">
                <p class="recipes_count"></p>
            </div>
        </section>

        <!-- RECIPIES SECTION -->
        <section>
            <div id="recipes-container" class="card_section"></div>
        </section>


    </main>





    <script type="module" src="./scripts/pages/index.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous">
    </script>
</body>

</html>
